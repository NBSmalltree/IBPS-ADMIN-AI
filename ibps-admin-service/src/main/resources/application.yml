server:
  port: 8080
  servlet:
    context-path: /ibps-admin

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:2881:ibps#obclient?useUnicode=true&characterEncoding=utf-8
    username: ibps_user
    password: ${IBPS_DB_PASSWORD:changeme}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# RocketMQ Configuration
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: ibps-admin-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# IBPS Custom Configuration
ibps:
  ccpc:
    url: ${CCPC_URL:http://localhost:9090/ccpc}
    timeout: 30000
  import:
    chunk-size: 1000
  trace:
    slow-threshold-ms: 800

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.actuary.ibps: DEBUG
    org.mybatis: DEBUG
